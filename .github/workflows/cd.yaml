name: CD

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is not on main history."
            exit 1
          fi

      - name: Validate semver tag format
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG_NAME' must match v<major>.<minor>.<patch>."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Detect and announce publish auth mode
        id: auth_mode
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "$NPM_TOKEN" ]]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "Publish auth mode: NPM_TOKEN"
            echo "- Publish auth mode: NPM_TOKEN" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Publish auth mode: trusted publishing (OIDC)"
            echo "- Publish auth mode: trusted publishing (OIDC)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish to npm with NPM token
        if: ${{ steps.auth_mode.outputs.mode == 'token' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Publish to npm with trusted publishing
        if: ${{ steps.auth_mode.outputs.mode == 'oidc' }}
        run: npm publish --provenance --access public
